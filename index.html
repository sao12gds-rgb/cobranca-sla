<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cobrança de Entrega em Atraso</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #eef2f7;
      color: #1f2937;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 14px;
      padding: 30px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      color: #003b73;
      font-size: 26px;
    }

    .subtitulo {
      color: #6b7280;
      margin-bottom: 25px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    label {
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 6px;
      display: block;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
    }

    textarea {
      margin-top: 20px;
      height: 340px;
      resize: vertical;
      line-height: 1.5;
      background: #f9fafb;
    }

    .botoes {
      display: flex;
      gap: 12px;
      margin-top: 22px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }

    .principal {
      background: #005baa;
      color: white;
    }

    .verde {
      background: #198754;
      color: white;
    }

    .cinza {
      background: #e5e7eb;
      color: #111827;
    }

    .aviso {
      margin-top: 15px;
      font-size: 13px;
      color: #6b7280;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .container {
        margin: 20px;
        padding: 22px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Cobrança de Entrega em Atraso</h1>
    <p class="subtitulo">Preencha os dados da carga para gerar o e-mail de cobrança com SLA vencido.</p>

    <div class="grid">
      <div>
        <label>E-mail Destinatário</label>
        <input type="email" id="destinatario" placeholder="exemplo@empresa.com">
      </div>

      <div>
        <label>AWB</label>
        <input type="text" id="awb" placeholder="Ex: 55362226">
      </div>

      <div>
        <label>Origem</label>
        <input type="text" id="origem" placeholder="Ex: SAO12">
      </div>

      <div>
        <label>Destino</label>
        <input type="text" id="destino" placeholder="Ex: SDU">
      </div>

      <div>
        <label>Status Atual</label>
        <select id="status">
          <option value="Pendente Desembarque">Pendente Desembarque</option>
          <option value="Pendente Tratativa">Pendente Tratativa</option>
          <option value="Pendente Saída para Entrega">Pendente Saída para Entrega</option>
          <option value="Pendente Entrega">Pendente Entrega</option>
          <option value="Em atraso">Em atraso</option>
        </select>
      </div>

      <div>
        <label>SLA Previsto</label>
        <input type="date" id="sla">
      </div>
    </div>

    <div class="botoes">
      <button class="principal" onclick="gerarEmail()">Gerar E-mail</button>
      <button class="verde" onclick="abrirOutlook()">Abrir no Outlook Web</button>
      <button class="cinza" onclick="copiarEmail()">Copiar Texto</button>
      <button class="cinza" onclick="limparCampos()">Limpar</button>
    </div>

    <textarea id="textoEmail" placeholder="O texto do e-mail aparecerá aqui..."></textarea>

    <p class="aviso">
      O botão “Abrir no Outlook Web” abre uma nova mensagem com destinatário, assunto e corpo preenchidos.
    </p>
  </div>

<script>
function formatarData(data) {
  if (!data) return "";

  const partes = data.split("-");
  return partes[2] + "/" + partes[1] + "/" + partes[0];
}

function gerarEmail() {
  const awb = document.getElementById("awb").value.trim();
  const origem = document.getElementById("origem").value.trim();
  const destino = document.getElementById("destino").value.trim();
  const status = document.getElementById("status").value;
  const sla = formatarData(document.getElementById("sla").value);

  const texto = `Prezados,

Identificamos que a remessa abaixo encontra-se com o SLA vencido, sem registro de entrega até o momento:

AWB: ${awb}
Origem: ${origem}
Destino: ${destino}
Status Atual: ${status}
SLA Previsto: ${sla}

Solicitamos atuação imediata para conclusão da entrega e regularização da ocorrência.

Pedimos, por gentileza, retorno com a previsão atualizada de entrega e detalhamento das ações adotadas para tratativa do embarque.

Em caso de qualquer impedimento operacional, favor informar imediatamente para alinhamento conjunto e mitigação dos impactos ao cliente.

Aguardamos posicionamento com prioridade.

Atenciosamente,`;

  document.getElementById("textoEmail").value = texto;
  return texto;
}

function abrirOutlook() {
  const destinatario = document.getElementById("destinatario").value.trim();
  const awb = document.getElementById("awb").value.trim();
  const texto = gerarEmail();

  const assunto = `Cobrança de Entrega em Atraso - AWB ${awb}`;

  const url = "https://outlook.office.com/mail/deeplink/compose"
    + "?to=" + encodeURIComponent(destinatario)
    + "&subject=" + encodeURIComponent(assunto)
    + "&body=" + encodeURIComponent(texto);

  window.open(url, "_blank");
}

function copiarEmail() {
  const texto = gerarEmail();

  navigator.clipboard.writeText(texto).then(function() {
    alert("Texto copiado com sucesso!");
  });
}

function limparCampos() {
  document.getElementById("destinatario").value = "";
  document.getElementById("awb").value = "";
  document.getElementById("origem").value = "";
  document.getElementById("destino").value = "";
  document.getElementById("status").value = "Pendente Desembarque";
  document.getElementById("sla").value = "";
  document.getElementById("textoEmail").value = "";
}
</script>

</body>
</html>
