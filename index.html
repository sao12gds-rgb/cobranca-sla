<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Cobrança SLA por Base</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #eef2f7;
      color: #1f2937;
    }

    .container {
      max-width: 1200px;
      margin: 30px auto;
      background: #fff;
      padding: 28px;
      border-radius: 14px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0;
      color: #003b73;
    }

    .subtitulo {
      color: #6b7280;
      margin-bottom: 25px;
    }

    .box {
      background: #f9fafb;
      border: 1px solid #d1d5db;
      padding: 18px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    input, button {
      padding: 11px;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      border: none;
      font-weight: bold;
    }

    .azul {
      background: #005baa;
      color: white;
    }

    .verde {
      background: #198754;
      color: white;
    }

    .cinza {
      background: #e5e7eb;
      color: #111827;
    }

    .vermelho {
      background: #dc2626;
      color: white;
    }

    .linha-acoes {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .resumo {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    .card {
      background: #f3f4f6;
      padding: 14px 18px;
      border-radius: 10px;
      font-weight: bold;
    }

    .base-card {
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 18px;
      background: #ffffff;
    }

    .base-topo {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .base-titulo {
      font-size: 18px;
      font-weight: bold;
      color: #003b73;
    }

    .email-input {
      width: 320px;
      max-width: 100%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 14px;
    }

    th {
      background: #003b73;
      color: white;
      padding: 10px;
      text-align: left;
    }

    td {
      border-bottom: 1px solid #e5e7eb;
      padding: 9px;
    }

    .aviso {
      font-size: 13px;
      color: #6b7280;
      margin-top: 12px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Cobrança de SLA em Atraso por Base</h1>
  <p class="subtitulo">
    Importe a planilha AWB Status. O sistema filtra AWBs pendentes com SLA vencido e agrupa por destino/base.
  </p>

  <div class="box">
    <label><strong>Importar planilha Excel:</strong></label><br><br>
    <input type="file" id="arquivoExcel" accept=".xlsx,.xls" />

    <div class="linha-acoes">
      <button class="azul" onclick="processarPlanilha()">Processar Planilha</button>
      <button class="cinza" onclick="limparTudo()">Limpar</button>
    </div>
  </div>

  <div class="box">
    <label><strong>E-mail padrão manual:</strong></label><br><br>
    <input type="email" id="emailPadrao" placeholder="Digite o e-mail da base/responsável" style="width: 350px;">
    <button class="verde" onclick="aplicarEmailTodos()">Aplicar para todas as bases</button>

    <p class="aviso">
      Você também pode preencher um e-mail diferente para cada base.
    </p>
  </div>

  <div class="resumo">
    <div class="card">Total na planilha: <span id="totalPlanilha">0</span></div>
    <div class="card">AWBs para cobrança: <span id="totalFiltrado">0</span></div>
    <div class="card">Bases com atraso: <span id="totalBases">0</span></div>
  </div>

  <div id="resultado"></div>
</div>

<script>
let gruposPorBase = {};

function converterDataExcel(valor) {
  if (!valor) return null;

  if (typeof valor === "number") {
    const data = XLSX.SSF.parse_date_code(valor);
    return new Date(data.y, data.m - 1, data.d);
  }

  if (typeof valor === "string") {
    const partes = valor.split(/[\/\-]/);

    if (partes.length === 3) {
      if (partes[0].length === 4) {
        return new Date(partes[0], partes[1] - 1, partes[2]);
      } else {
        return new Date(partes[2], partes[1] - 1, partes[0]);
      }
    }
  }

  return null;
}

function formatarData(data) {
  if (!data) return "";

  const dia = String(data.getDate()).padStart(2, "0");
  const mes = String(data.getMonth() + 1).padStart(2, "0");
  const ano = data.getFullYear();

  return `${dia}/${mes}/${ano}`;
}

function montarAWB(linha) {
  const prefixo = linha["AWBPrefix"] || "";
  const numero = linha["AWBNumber"] || "";

  if (prefixo && numero) {
    return `${prefixo}${numero}`;
  }

  return numero || linha["AWB"] || "";
}

function processarPlanilha() {
  const arquivo = document.getElementById("arquivoExcel").files[0];

  if (!arquivo) {
    alert("Selecione uma planilha Excel.");
    return;
  }

  const leitor = new FileReader();

  leitor.onload = function(e) {
    const dados = new Uint8Array(e.target.result);
    const workbook = XLSX.read(dados, { type: "array" });
    const primeiraAba = workbook.SheetNames[0];
    const planilha = workbook.Sheets[primeiraAba];
    const linhas = XLSX.utils.sheet_to_json(planilha);

    document.getElementById("totalPlanilha").innerText = linhas.length;

    const hoje = new Date();
    hoje.setHours(0, 0, 0, 0);

    const filtrados = linhas.filter(linha => {
      const status = String(linha["StatusDescription"] || "").trim();
      const sla = converterDataExcel(linha["ApproxSLA"]);

      if (!sla) return false;

      sla.setHours(0, 0, 0, 0);

      const statusValido =
        status === "Pendente Entrega" ||
        status === "Pendente Desembarque";

      const slaVencido = sla < hoje;

      return statusValido && slaVencido;
    }).map(linha => {
      return {
        awb: montarAWB(linha),
        origem: linha["OriginCode"] || "",
        destino: linha["DestinationCode"] || "SEM DESTINO",
        status: linha["StatusDescription"] || "",
        sla: converterDataExcel(linha["ApproxSLA"])
      };
    });

    gruposPorBase = {};

    filtrados.forEach(item => {
      const base = item.destino;

      if (!gruposPorBase[base]) {
        gruposPorBase[base] = {
          base: base,
          email: "",
          cargas: []
        };
      }

      gruposPorBase[base].cargas.push(item);
    });

    document.getElementById("totalFiltrado").innerText = filtrados.length;
    document.getElementById("totalBases").innerText = Object.keys(gruposPorBase).length;

    renderizarGrupos();
  };

  leitor.readAsArrayBuffer(arquivo);
}

function renderizarGrupos() {
  const resultado = document.getElementById("resultado");
  const bases = Object.keys(gruposPorBase).sort();

  if (bases.length === 0) {
    resultado.innerHTML = "<p><strong>Nenhuma AWB pendente com SLA vencido foi encontrada.</strong></p>";
    return;
  }

  let html = "";

  bases.forEach(base => {
    const grupo = gruposPorBase[base];

    html += `
      <div class="base-card">
        <div class="base-topo">
          <div class="base-titulo">
            Base: ${base} | Total de AWBs: ${grupo.cargas.length}
          </div>

          <div>
            <input
              class="email-input"
              type="email"
              id="email-${base}"
              placeholder="E-mail da base"
              value="${grupo.email}"
              onchange="atualizarEmailBase('${base}', this.value)"
            >

            <button class="vermelho" onclick="abrirOutlookBase('${base}')">
              Cobrar Base
            </button>
          </div>
        </div>

        <table>
          <thead>
            <tr>
              <th>AWB</th>
              <th>Origem</th>
              <th>Destino</th>
              <th>Status</th>
              <th>SLA</th>
            </tr>
          </thead>
          <tbody>
    `;

    grupo.cargas.forEach(item => {
      html += `
        <tr>
          <td>${item.awb}</td>
          <td>${item.origem}</td>
          <td>${item.destino}</td>
          <td>${item.status}</td>
          <td>${formatarData(item.sla)}</td>
        </tr>
      `;
    });

    html += `
          </tbody>
        </table>
      </div>
    `;
  });

  resultado.innerHTML = html;
}

function atualizarEmailBase(base, email) {
  gruposPorBase[base].email = email;
}

function aplicarEmailTodos() {
  const email = document.getElementById("emailPadrao").value.trim();

  if (!email) {
    alert("Digite um e-mail padrão.");
    return;
  }

  Object.keys(gruposPorBase).forEach(base => {
    gruposPorBase[base].email = email;
  });

  renderizarGrupos();
}

function gerarTextoEmailBase(grupo) {
  let listaAWBs = "";

  grupo.cargas.forEach(item => {
    listaAWBs += `AWB: ${item.awb} | Origem: ${item.origem} | Destino: ${item.destino} | Status: ${item.status} | SLA: ${formatarData(item.sla)}\n`;
  });

  return `Prezados,

Identificamos que as remessas abaixo encontram-se com o SLA vencido, sem registro de entrega até o momento:

${listaAWBs}

Solicitamos atuação imediata para conclusão das entregas e regularização das ocorrências.

Pedimos, por gentileza, retorno com a previsão atualizada de entrega e detalhamento das ações adotadas para tratativa dos embarques.

Em caso de qualquer impedimento operacional, favor informar imediatamente para alinhamento conjunto e mitigação dos impactos ao cliente.

Aguardamos posicionamento com prioridade.

Atenciosamente,`;
}

function abrirOutlookBase(base) {
  const grupo = gruposPorBase[base];
  const emailDigitado = document.getElementById(`email-${base}`).value.trim();

  if (!emailDigitado) {
    alert("Digite o e-mail da base antes de cobrar.");
    return;
  }

  grupo.email = emailDigitado;

  const assunto = `Cobrança de Entregas em Atraso - Base ${base} - ${grupo.cargas.length} AWB(s)`;
  const corpo = gerarTextoEmailBase(grupo);

  const url = "https://outlook.office.com/mail/deeplink/compose"
    + "?to=" + encodeURIComponent(grupo.email)
    + "&subject=" + encodeURIComponent(assunto)
    + "&body=" + encodeURIComponent(corpo);

  window.open(url, "_blank");
}

function limparTudo() {
  document.getElementById("arquivoExcel").value = "";
  document.getElementById("emailPadrao").value = "";
  document.getElementById("totalPlanilha").innerText = "0";
  document.getElementById("totalFiltrado").innerText = "0";
  document.getElementById("totalBases").innerText = "0";
  document.getElementById("resultado").innerHTML = "";
  gruposPorBase = {};
}
</script>

</body>
</html>
